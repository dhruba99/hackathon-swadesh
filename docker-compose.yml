services:
  postgres:
    image: postgres:16-alpine
    container_name: audio-upload-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: audio_uploads
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d audio_uploads"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
